<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources</title>
    <style>
        :root {
            --bg-color: #e0e0e0;
            --text-black: #1a1a1a;
            --accent-green: #76d653;
            --card-white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-black);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: -10px;
            left: 0;
            cursor: pointer;
            transition: transform 0.2s;
            fill: var(--text-black);
        }
        .back-btn:hover { transform: scale(1.1); }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .pdf-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .pdf-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 20px;
            border-radius: 16px;
            gap: 25px;
            transition: background 0.3s;
        }

        .pdf-item:hover { background: rgba(255, 255, 255, 0.6); }

        .pdf-icon-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .pdf-icon-wrapper:hover { transform: translateY(-3px); }
        
        .pdf-icon {
            width: 65px;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.15));
        }

        .info {
            flex-grow: 1;
        }

        .name {
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            margin-bottom: 2px;
            letter-spacing: 0.5px;
        }

        .description {
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .view-stats {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-green);
            background: rgba(0,0,0,0.05);
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .btn-preview {
            background-color: #fff;
            color: black;
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn-preview:hover {
            background-color: #f9f9f9;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            padding: 30px;
            backdrop-filter: blur(5px);
        }

        .modal-box {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            color: black;
            cursor: pointer;
            z-index: 2100;
            background: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="back-btn" onclick="window.location.href='index.html'">
            <svg width="48" height="48" viewBox="0 0 512 512"><path d="M256 48C141.1 48 48 141.1 48 256s93.1 208 208 208 208-93.1 208-208S370.9 48 256 48zm43.4 289.1c7.5 7.5 7.5 19.8 0 27.3s-19.8 7.5-27.3 0L173.4 265.7c-5.4-5.4-8.1-12.4-8.1-19.7s2.7-14.3 8.1-19.7L272 127.6c7.5-7.5 19.8-7.5 27.3 0s7.5 19.8 0 27.3L211.3 246h176.1c10.6 0 19.2 8.6 19.2 19.2s-8.6 19.2-19.2 19.2H211.3l88.1 82.7z"/></svg>
        </div>

        <header>
            <h1>Resources</h1>
        </header>

        <div id="fileContainer" class="pdf-list"></div>
    </div>

    <div id="previewModal" class="modal-overlay">
        <span class="close-modal" onclick="closePreview()">&times;</span>
        <div class="modal-box">
            <iframe id="pdfViewer" src=""></iframe>
        </div>
    </div>

    <script>
        // Updated list including PHP, Java, and Python references
        const defaultFiles = [
            { 
                id: 1, 
                name: "HTML Reference", 
                desc: "Complete Tags & Attributes Guide", 
                path: "Pdfs/HTML_Reference.pdf" 
            },
            { 
                id: 2, 
                name: "CSS Reference", 
                desc: "Styling & Layout Cheat Sheet", 
                path: "Pdfs/CSS_Reference.pdf" 
            },
            { 
                id: 3, 
                name: "JS Reference", 
                desc: "JavaScript Logic & Syntax Guide", 
                path: "Pdfs/JS_Reference.pdf" 
            },
            { 
                id: 4, 
                name: "PHP Reference", 
                desc: "Server-side Scripting Guide", 
                path: "Pdfs/PHP_Reference.pdf" 
            },
            { 
                id: 5, 
                name: "Java Reference", 
                desc: "Object Oriented Programming Guide", 
                path: "Pdfs/Java_Reference.pdf" 
            },
            { 
                id: 6, 
                name: "Python Reference", 
                desc: "Syntax & Scripting Reference", 
                path: "Pdfs/Python_Reference.pdf" 
            }
        ];

        let viewData = JSON.parse(localStorage.getItem('pdfViewStats')) || {};
        const container = document.getElementById('fileContainer');

        function render() {
            container.innerHTML = defaultFiles.map(file => {
                const count = viewData[file.id] || 0;
                return `
                <div class="pdf-item">
                    <div class="pdf-icon-wrapper" onclick="openPreview(${file.id}, '${file.path}')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg" class="pdf-icon">
                    </div>
                    <div class="info">
                        <div class="name">${file.name}</div>
                        <div class="description">${file.desc}</div>
                        <div class="view-stats">Views: ${count}</div>
                    </div>
                    <button class="btn-preview" onclick="openPreview(${file.id}, '${file.path}')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        Preview
                    </button>
                </div>
            `}).join('');
        }

        function openPreview(id, path) {
            viewData[id] = (viewData[id] || 0) + 1;
            localStorage.setItem('pdfViewStats', JSON.stringify(viewData));
            
            document.getElementById('pdfViewer').src = path;
            document.getElementById('previewModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            render();
        }

        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
            document.getElementById('pdfViewer').src = "";
            document.body.style.overflow = 'auto';
        }

        render();
    </script>
</body>
</html>
